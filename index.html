<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Landing + Dashboard Profesional</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        header {
            background: #1e1e1e;
            padding: 15px;
            color: white;
            text-align: center;
        }

        /* LANDING */
        .hero {
            padding: 80px;
            text-align: center;
            background: linear-gradient(135deg, #4a90e2, #007bff);
            color: white;
        }

        .hero h1 {
            font-size: 45px;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 20px;
            margin-bottom: 20px;
        }

        .btn {
            background: white;
            color: #007bff;
            padding: 12px 25px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }

        /* LOGIN */
        #login {
            padding: 40px;
            text-align: center;
        }

        #login input {
            padding: 10px;
            width: 220px;
            margin-bottom: 10px;
        }

        #login button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        /* DASHBOARD */
        #dashboard {
            padding: 40px;
            display: none;
        }

        #dashboard h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 20px;
            width: 220px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin-bottom: 10px;
        }

        /* GRÁFICA */
        #chart {
            width: 80%;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<header>
    <h1>Landing Page Profesional</h1>
</header>

<section class="hero">
    <h1>Dashboard con roles, estadísticas y API REST</h1>
    <p>Demostración de habilidades en desarrollo web profesional.</p>

    <!-- BOTÓN ARREGLADO -->
    <a class="btn" onclick="goToLogin()">Acceder al Dashboard</a>
</section>

<!-- LOGIN -->
<section id="login">
    <h2>Iniciar sesión</h2>
    <p>Introduce tu rol para acceder:</p>

    <input id="rolInput" type="text" placeholder="admin / usuario">
    <br>
    <button onclick="login()">Acceder</button>
</section>

<!-- DASHBOARD -->
<section id="dashboard">
    <h2>Panel de Control</h2>

    <div class="stats">
        <div class="card">
            <h3>Usuarios</h3>
            <p id="usuarios-count">0</p>
        </div>

        <div class="card">
            <h3>Visitas</h3>
            <p id="visitas-count">0</p>
        </div>

        <div class="card">
            <h3>Ventas</h3>
            <p id="ventas-count">0</p>
        </div>
    </div>

    <div id="chart">
        <h3>Gráfica de Actividad</h3>
        <canvas id="myChart"></canvas>
    </div>
</section>

<!-- CHART.JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    // API REST FALSA
    const fakeAPI = {
        usuarios: 128,
        visitas: 5420,
        ventas: 32,
        grafica: [12, 19, 3, 5, 2, 3]
    };

    // BOTÓN ARREGLADO: SCROLL SUAVE AL LOGIN
    function goToLogin() {
        document.getElementById("login").scrollIntoView({ behavior: "smooth" });
    }

    // LOGIN FALSO
    function login() {
        const rol = document.getElementById("rolInput").value;

        if (rol === "admin") {
            document.getElementById("login").style.display = "none";
            document.getElementById("dashboard").style.display = "block";

            // Cargar datos del dashboard
            document.getElementById("usuarios-count").innerText = fakeAPI.usuarios;
            document.getElementById("visitas-count").innerText = fakeAPI.visitas;
            document.getElementById("ventas-count").innerText = fakeAPI.ventas;

            // Gráfica
            new Chart(document.getElementById("myChart"), {
                type: 'line',
                data: {
                    labels: ["Lun", "Mar", "Mié", "Jue", "Vie", "Sáb"],
                    datasets: [{
                        label: "Actividad",
                        data: fakeAPI.grafica,
                        borderColor: "#007bff",
                        borderWidth: 2
                    }]
                }
            });

        } else {
            alert("No tienes permisos para ver el dashboard");
        }
    }
</script>

</body>
</html>
